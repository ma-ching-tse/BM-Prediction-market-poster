<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>NBA 热门比赛海报（横版 2:1）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 2400px;
      height: 1200px;
      overflow: hidden;
      background: #000;
    }

    #poster {
      position: relative;
      width: 2400px;
      height: 1200px;
      overflow: hidden;
      font-family: "MiSans VF", "HarmonyOS Sans", "PingFang SC", "Noto Sans SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    .bg-image {
      position: absolute;
      left: -1px;
      top: -1px;
      width: 2401px;
      height: 1200px;
      object-fit: cover;
    }

    .poster-copy {
      position: absolute;
      left: 119px;
      top: 119px;
      width: var(--poster-title-width, 1080px);
      display: flex;
      flex-direction: column;
      gap: 24px;
      color: #fff;
      z-index: 2;
    }

    .poster-title {
      font-size: var(--poster-title-size, 150px);
      line-height: var(--poster-title-line-height, 1.2);
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
    }

    .poster-subtitle {
      font-size: var(--poster-subtitle-size, 56px);
      line-height: var(--poster-subtitle-line-height, 1.3);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.95);
      text-shadow: 0 6px 20px rgba(0, 0, 0, 0.28);
      white-space: nowrap;
      overflow: hidden;
    }

    .right-column {
      position: absolute;
      left: 1207px;
      top: 50%;
      transform: translateY(-50%);
      width: 1072px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      z-index: 2;
    }

    .game-card {
      width: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid #5d5d5d;
      border-radius: 20px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .logo-slot {
      flex-shrink: 0;
      width: 200px;
      height: 204px;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
    }

    .logo-slot img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .game-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .game-meta {
      display: flex;
      flex-direction: column;
    }

    .game-date {
      font-size: 24px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      line-height: 40px;
    }

    .game-matchup {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .team-name {
      flex: 1;
      min-width: 0;
      font-size: 36px;
      font-weight: 400;
      color: #fff;
      line-height: 1.2;
      word-break: break-word;
      overflow-wrap: break-word;
    }
    .team-name.home { text-align: right; }
    .team-name.away { text-align: left; }

    .vs-wrap {
      flex-shrink: 0;
      width: 128px;
      height: 67px;
      position: relative;
      overflow: hidden;
    }

    .vs-wrap img {
      position: absolute;
      height: 100%;
      width: 268.6%;
      left: -88.2%;
      top: 0;
      object-fit: cover;
    }

    .win-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .reward-line {
      font-size: 20px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      line-height: 32px;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .reward-line.align-left { text-align: left; }
    .reward-line.align-center { text-align: center; }

    .progress-track {
      height: 36px;
      border-radius: 61px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 15.8px 0 rgba(243, 243, 243, 0.1);
    }

    .progress-track img.track-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 61px;
    }

    .progress-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      border-radius: 79px;
      background: #01e0e0;
      box-shadow:
        inset 0px 0px 6.1px rgba(75, 25, 208, 0.26),
        inset 0px -9px 23.2px rgba(255, 255, 255, 0.25),
        inset 0px -4px 38.4px rgba(255, 255, 255, 0.4),
        inset 0px 4px 11.9px rgba(0, 0, 0, 0.25);
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 22px;
      border-radius: 79px;
      background: linear-gradient(180deg, rgba(243, 243, 243, 0.4) 0%, rgba(243, 243, 243, 0) 51%);
    }

    .pct-label {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      font-weight: 500;
      color: #010101;
      opacity: 0.85;
      z-index: 2;
      white-space: nowrap;
      pointer-events: none;
    }
    .pct-label.on-gray {
      color: #fff;
      opacity: 0.85;
    }

    .news-line {
      font-size: 20px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      line-height: 32px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .poster-footer {
      font-size: 26px;
      line-height: 1.2;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
      padding: 12px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-logo {
      position: absolute;
      left: 120px;
      bottom: 120px;
      width: 366px;
      height: 88px;
      z-index: 2;
    }
    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <div id="poster">
    <img class="bg-image" id="bg-image" src="backgrounds-NBA-horizontal/backgrounds-NBA-horizontal.png" alt="" />
    <div class="poster-copy" id="poster-copy">
      <div class="poster-title" id="poster-title"></div>
      <div class="poster-subtitle" id="poster-subtitle"></div>
    </div>
    <div class="right-column" id="right-column">
      <!-- 由 JS 动态渲染：3 张卡片 + footer -->
    </div>
    <div class="brand-logo">
      <img src="assets/bitmart-logo-horizontal.png" alt="BitMart" />
    </div>
  </div>

  <script>
    // 预览用默认数据（generate.js 会注入 window.GAMES_DATA 覆盖它）
    const PREVIEW_DATA = {
      copy: {
        title: "NBA热门比赛",
        subtitle: "预测比赛，赢取奖励",
        footer: "立即加入：預測市場 – 體育 – NBA",
        titleFontSize: 150,
        titleLineHeight: 1.2,
        titleMaxWidth: 1080,
        subtitleFontSize: 56,
        subtitleLineHeight: 1.3
      },
      games: [
        {
          date: "2026-04-09",
          homeTeam: { name: "凯尔特人", logo: "NBA_icon/波士顿凯尔特人.png", winRate: 58, seriesWins: 2 },
          awayTeam: { name: "尼克斯",   logo: "NBA_icon/纽约尼克斯.png",    winRate: 42, seriesWins: 2 },
          reward: "预测正确：28U 赢取 100U",
          news: "文班亚马出战成疑，开拓者能否借机捍卫主场"
        },
        {
          date: "2026-04-09",
          homeTeam: { name: "湖人", logo: "NBA_icon/洛杉矶湖人.png", winRate: 45 },
          awayTeam: { name: "勇士", logo: "NBA_icon/金州勇士.png",   winRate: 55 },
          reward: "预测正确：35U 赢取 100U",
          news: "库里三分状态火热，湖人防线面临大考"
        },
        {
          date: "2026-04-10",
          homeTeam: { name: "热火", logo: "NBA_icon/迈阿密热火.png", winRate: 50 },
          awayTeam: { name: "公牛", logo: "NBA_icon/芝加哥公牛.png", winRate: 50 },
          reward: "预测正确：22U 赢取 100U",
          news: "东部强强对话，主场优势是否能决定胜负"
        }
      ]
    };

    const data = window.GAMES_DATA || PREVIEW_DATA;

    if (window.BG_PATH) {
      document.getElementById('bg-image').src = window.BG_PATH;
    }

    function applyCopy(copy) {
      const titleEl = document.getElementById('poster-title');
      const subtitleEl = document.getElementById('poster-subtitle');
      const root = document.getElementById('poster');
      if (!copy || !titleEl || !subtitleEl || !root) return;

      titleEl.textContent = copy.title || '';
      subtitleEl.textContent = copy.subtitle || '';

      root.style.setProperty('--poster-title-size', `${Number(copy.titleFontSize || 150)}px`);
      root.style.setProperty('--poster-title-line-height', String(copy.titleLineHeight || 1.2));
      root.style.setProperty('--poster-title-width', `${Number(copy.titleMaxWidth || 1080)}px`);
      root.style.setProperty('--poster-subtitle-size', `${Number(copy.subtitleFontSize || 56)}px`);
      root.style.setProperty('--poster-subtitle-line-height', String(copy.subtitleLineHeight || 1.3));

      fitTitle(copy);
      fitSubtitle(copy);
    }

    // 大标题自适应：若超出两行则缩小字号，确保两行内完整显示
    function fitTitle(copy) {
      const root = document.getElementById('poster');
      const titleEl = document.getElementById('poster-title');
      if (!root || !titleEl) return;

      const baseFontSize = Number(copy.titleFontSize || 150);
      const lineHeight = Number(copy.titleLineHeight || 1.2);
      const maxH = (fs) => Math.ceil(fs * lineHeight * 2) + 20;

      root.style.setProperty('--poster-title-size', `${baseFontSize}px`);
      titleEl.style.maxHeight = 'none';
      void titleEl.offsetHeight;
      if (titleEl.scrollHeight <= maxH(baseFontSize)) {
        titleEl.style.maxHeight = `${maxH(baseFontSize)}px`;
        titleEl.style.overflow = 'hidden';
        return;
      }

      let lo = Math.max(60, Math.round(baseFontSize * 0.5));
      let hi = baseFontSize;
      let chosen = lo;

      while (lo <= hi) {
        const mid = Math.round((lo + hi) / 2);
        root.style.setProperty('--poster-title-size', `${mid}px`);
        titleEl.style.maxHeight = 'none';
        void titleEl.offsetHeight;
        if (titleEl.scrollHeight <= maxH(mid)) {
          chosen = mid;
          lo = mid + 1;
        } else {
          hi = mid - 1;
        }
      }

      root.style.setProperty('--poster-title-size', `${chosen}px`);
      titleEl.style.maxHeight = `${maxH(chosen)}px`;
      titleEl.style.overflow = 'hidden';
    }

    // 副标题保持单行：过长时自动缩小字号
    function fitSubtitle(copy) {
      const root = document.getElementById('poster');
      const subtitleEl = document.getElementById('poster-subtitle');
      if (!root || !subtitleEl) return;

      const baseFontSize = Number(copy.subtitleFontSize || 56);
      const minFontSize = 28;
      root.style.setProperty('--poster-subtitle-size', `${baseFontSize}px`);
      subtitleEl.style.textOverflow = 'clip';
      void subtitleEl.offsetWidth;

      if (subtitleEl.scrollWidth <= subtitleEl.clientWidth + 1) return;

      let lo = minFontSize;
      let hi = baseFontSize;
      let chosen = minFontSize;
      while (lo <= hi) {
        const mid = Math.round((lo + hi) / 2);
        root.style.setProperty('--poster-subtitle-size', `${mid}px`);
        void subtitleEl.offsetWidth;
        if (subtitleEl.scrollWidth <= subtitleEl.clientWidth + 1) {
          chosen = mid;
          lo = mid + 1;
        } else {
          hi = mid - 1;
        }
      }
      root.style.setProperty('--poster-subtitle-size', `${chosen}px`);
    }

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatTeamName(team) {
      const name = String(team?.name ?? '');
      const wins = team?.seriesWins;
      const hasWins = wins !== undefined && wins !== null && wins !== '';
      return hasWins ? `${name}（${wins}）` : name;
    }

    function renderRightColumn(games, footer) {
      const container = document.getElementById('right-column');
      const cardsHtml = games.map(g => {
        const homePct = Number(g.homeTeam.winRate) || 0;
        const awayPct = Number(g.awayTeam.winRate) || 0;
        // 百分比分别放在进度条蓝色/灰色区域的中点，过窄时靠边避免溢出
        const homeLeft = Math.max(6, Math.min(homePct - 3, homePct / 2));
        const awayLeft = Math.min(94, Math.max(homePct + 3, homePct + awayPct / 2));
        return `
          <div class="game-card">
            <div class="logo-slot">
              <img src="${escapeHtml(g.homeTeam.logo)}" alt="${escapeHtml(g.homeTeam.name)}" />
            </div>
            <div class="game-info">
              <div class="game-meta">
                <div class="game-date">${escapeHtml(g.date || '')}</div>
                <div class="game-matchup">
                  <div class="team-name home">${escapeHtml(formatTeamName(g.homeTeam))}</div>
                  <div class="vs-wrap"><img src="assets/vs_new.png" alt="VS" /></div>
                  <div class="team-name away">${escapeHtml(formatTeamName(g.awayTeam))}</div>
                </div>
              </div>
              <div class="win-section">
                <div class="reward-line${homePct === awayPct ? ' align-center' : (homePct < awayPct ? ' align-left' : '')}">${escapeHtml(g.reward || '')}</div>
                <div class="progress-track">
                  <img class="track-bg" src="assets/track_new.png" alt="" />
                  <div class="progress-fill" style="width: ${homePct}%"></div>
                  <span class="pct-label" style="left: ${homeLeft}%">${homePct}%</span>
                  <span class="pct-label on-gray" style="left: ${awayLeft}%">${awayPct}%</span>
                </div>
                <div class="news-line">${escapeHtml(g.news || '')}</div>
              </div>
            </div>
            <div class="logo-slot">
              <img src="${escapeHtml(g.awayTeam.logo)}" alt="${escapeHtml(g.awayTeam.name)}" />
            </div>
          </div>
        `;
      }).join('');

      const footerHtml = footer
        ? `<div class="poster-footer">${escapeHtml(footer)}</div>`
        : '';

      container.innerHTML = cardsHtml + footerHtml;
    }

    applyCopy(data.copy || PREVIEW_DATA.copy);
    renderRightColumn(data.games, (data.copy || PREVIEW_DATA.copy).footer);
  </script>
</body>
</html>
