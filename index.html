<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>海报生成器 — BitMart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:              oklch(7.5% 0.016 245);
      --surface:         oklch(10%  0.020 245);
      --surface-hover:   oklch(12%  0.024 245);
      --surface-sel:     oklch(10.5% 0.038 260);
      --border-sub:      oklch(15%  0.020 245);
      --border:          oklch(20%  0.025 245);
      --accent:          oklch(57%  0.21  260);
      --accent-dim:      oklch(28%  0.10  260);
      --accent-text:     oklch(72%  0.14  260);
      --fg:              oklch(90%  0.008 245);
      --fg-2:            oklch(56%  0.018 245);
      --fg-3:            oklch(52%  0.016 245);
      --fg-muted:        oklch(34%  0.014 245);
      --log-green:       oklch(73%  0.13  145);
      --log-red:         oklch(67%  0.19   25);
      --log-dim:         oklch(44%  0.016 245);
      --green:           oklch(69%  0.16  145);
      --red:             oklch(64%  0.20   25);
      --amber:           oklch(78%  0.14   85);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      padding: clamp(24px, 4vw, 44px) clamp(16px, 3vw, 32px);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Shell ── */
    .shell {
      max-width: 1120px;
      margin: 0 auto;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: clamp(28px, 4vw, 48px);
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border-sub);
    }

    .topbar-wordmark {
      font-size: 13px;
      font-weight: 700;
      color: var(--fg);
      letter-spacing: -0.02em;
    }

    .topbar-slash {
      margin: 0 10px;
      color: oklch(38% 0.018 245);
      font-weight: 300;
      font-size: 18px;
      line-height: 1;
    }

    .topbar-page {
      font-size: 13px;
      font-weight: 500;
      color: var(--fg-2);
    }

    .topbar-spacer { flex: 1; }

    .topbar-env {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--fg-3);
      letter-spacing: 0.04em;
      background: var(--surface);
      border: 1px solid var(--border-sub);
      padding: 3px 8px;
      border-radius: 4px;
    }

    /* ── Main layout ── */
    .main {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      align-items: start;
    }

    .left  { min-width: 0; }

    .right { display: none; }

    /* ── Section label ── */
    .slabel {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      font-weight: 600;
      color: var(--fg-3);
      text-transform: uppercase;
      letter-spacing: 0.10em;
      margin-bottom: 10px;
    }

    .slabel-bar {
      width: 2px;
      height: 11px;
      background: var(--accent);
      border-radius: 1px;
      flex-shrink: 0;
    }

    /* ── Template grid ── */
    .tgrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin-bottom: 18px;
    }

    .tcard {
      position: relative;
      padding: 11px 11px 9px 13px;
      background: var(--surface);
      border: 1px solid var(--border-sub);
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      user-select: none;
      overflow: hidden;
    }

    .tcard::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: transparent;
      transition: background 0.1s;
    }

    .tcard:hover {
      background: var(--surface-hover);
      border-color: var(--border);
    }

    .tcard.selected {
      background: var(--surface-sel);
      border-color: var(--accent-dim);
    }

    .tcard.selected::after {
      background: var(--accent);
    }

    .tcard-num {
      position: absolute;
      top: 8px;
      right: 9px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--fg-muted);
      opacity: 0.65;
    }

    .tcard-name {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--fg);
      line-height: 1.3;
      margin-bottom: 3px;
      transition: color 0.1s;
    }

    .tcard-key {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      color: var(--fg-3);
    }

    .tcard.selected .tcard-name { color: var(--accent-text); }
    .tcard.selected .tcard-key  { color: var(--accent-text); opacity: 0.65; }
    .tcard.selected .tcard-num  { color: var(--accent-text); opacity: 0.4; }

    /* ── Actions ── */
    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    #btn-generate {
      position: relative;
      padding: 8px 20px;
      background: var(--accent);
      color: oklch(97% 0.005 245);
      border: none;
      border-radius: 5px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      overflow: hidden;
      flex-shrink: 0;
      transition: opacity 0.12s, transform 0.08s;
    }

    #btn-generate::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg,
        transparent 0%,
        oklch(100% 0 0 / 0.10) 45%,
        transparent 55%
      );
      transform: translateX(-120%);
    }

    #btn-generate.running::before {
      animation: sheen 1.6s ease-in-out infinite;
    }

    @keyframes sheen {
      to { transform: translateX(220%); }
    }

    #btn-generate:hover:not(:disabled) { opacity: 0.87; transform: translateY(-1px); }
    #btn-generate:active:not(:disabled) { transform: translateY(0); }
    #btn-generate:disabled { opacity: 0.30; cursor: not-allowed; }

    #status-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--fg-2);
    }

    /* ── Status badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 7px 2px 5px;
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .badge-running {
      background: oklch(14% 0.04 260);
      color: oklch(68% 0.15 260);
    }
    .badge-running .badge-dot {
      background: oklch(65% 0.18 260);
      animation: blink-dot 1s ease-in-out infinite;
    }

    .badge-done {
      background: oklch(13% 0.04 145);
      color: var(--green);
    }
    .badge-done .badge-dot { background: var(--green); }

    .badge-fail {
      background: oklch(12% 0.05 25);
      color: var(--red);
    }
    .badge-fail .badge-dot { background: var(--red); }

    @keyframes blink-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── Log terminal ── */
    .log-terminal {
      border: 1px solid var(--border-sub);
      border-radius: 7px;
      background: oklch(6.5% 0.013 245);
      overflow: hidden;
    }

    .log-chrome {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border-sub);
      background: oklch(8% 0.015 245);
    }

    .chrome-dots {
      display: flex;
      gap: 5px;
      margin-right: 10px;
    }

    .cdot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }
    .cdot-r { background: oklch(55% 0.19 25 / 0.55); }
    .cdot-y { background: oklch(76% 0.14 85 / 0.55); }
    .cdot-g { background: oklch(60% 0.16 145 / 0.55); }

    .chrome-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--fg-3);
      letter-spacing: 0.04em;
      flex: 1;
    }

    #btn-open {
      display: none;
      padding: 3px 9px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--fg-2);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }

    #btn-open:hover { background: var(--surface-hover); color: var(--fg); }

    /* log body with line-number gutter */
    .log-body {
      display: flex;
      height: 272px;
      overflow: hidden;
    }

    .log-gutter {
      flex-shrink: 0;
      width: 38px;
      padding: 12px 0;
      border-right: 1px solid var(--border-sub);
      background: oklch(7% 0.014 245);
    }

    .log-gutter-num {
      display: block;
      padding: 0 8px 0 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      line-height: 1.75;
      color: var(--fg-muted);
      text-align: right;
      opacity: 0.5;
      user-select: none;
    }

    .log-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 14px;
    }

    .log-content::-webkit-scrollbar { width: 3px; }
    .log-content::-webkit-scrollbar-track { background: transparent; }
    .log-content::-webkit-scrollbar-thumb { background: var(--fg-muted); border-radius: 2px; }

    .log-line {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      line-height: 1.75;
      color: var(--log-dim);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-line.ok   { color: var(--log-green); }
    .log-line.err  { color: var(--log-red); }
    .log-line.idle { color: var(--fg-2); font-style: italic; opacity: 0.7; }

    .log-cursor {
      display: inline-block;
      width: 6px;
      height: 11px;
      background: var(--accent);
      vertical-align: text-bottom;
      margin-left: 1px;
      animation: cur 1s step-end infinite;
      opacity: 0.85;
    }

    @keyframes cur {
      0%, 100% { opacity: 0.85; }
      50%       { opacity: 0; }
    }

    /* ── Right / preview ── */
    .right {
      position: sticky;
      top: clamp(24px, 4vw, 44px);
    }

    .preview-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--surface);
      border: 1px solid var(--border-sub);
      border-radius: 7px;
      overflow: hidden;
    }

    /* empty state */
    .preview-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: none;
    }

    .preview-glyph {
      font-size: 36px;
      line-height: 1;
      opacity: 0.07;
      color: var(--fg);
      user-select: none;
    }

    .preview-empty-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--fg-muted);
      opacity: 0.38;
    }

    /* loading overlay */
    .preview-loader {
      display: none;
      position: absolute;
      inset: 0;
      background: oklch(8.5% 0.018 245 / 0.9);
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .preview-loader.on { display: flex; }

    .spin {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: rot 0.6s linear infinite;
    }

    @keyframes rot { to { transform: rotate(360deg); } }

    /* iframe wrapper */
    .preview-iframe-wrap {
      display: none;
      position: absolute;
      inset: 0;
    }

    .preview-iframe-wrap.on { display: block; }

    #preview-frame {
      width: 1200px;
      height: 1200px;
      border: none;
      transform-origin: top left;
      pointer-events: none;
    }

    .preview-note {
      margin-top: 8px;
      font-size: 10.5px;
      color: var(--fg-3);
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <div class="shell">

    <header class="topbar">
      <span class="topbar-wordmark">BitMart</span>
      <span class="topbar-slash">/</span>
      <span class="topbar-page">海报生成器</span>
      <div class="topbar-spacer"></div>
      <span class="topbar-env">localhost:3002</span>
    </header>

    <div class="main">

      <!-- ── Left ── -->
      <div class="left">

        <div class="slabel"><span class="slabel-bar"></span>选择模板</div>
        <div class="tgrid" id="templates"></div>

        <div class="actions">
          <button id="btn-generate" disabled>生成海报</button>
          <span id="status-text">请先选择模板</span>
        </div>

        <div class="log-terminal">
          <div class="log-chrome">
            <div class="chrome-dots">
              <div class="cdot cdot-r"></div>
              <div class="cdot cdot-y"></div>
              <div class="cdot cdot-g"></div>
            </div>
            <span class="chrome-title">运行日志</span>
            <button id="btn-open">打开输出文件夹</button>
          </div>
          <div class="log-body">
            <div class="log-gutter" id="log-gutter"></div>
            <div class="log-content" id="log-content">
              <span class="log-line idle" id="log-placeholder">等待生成指令…</span>
            </div>
          </div>
        </div>

      </div>

      <!-- ── Right ── -->
      <div class="right">
        <div class="slabel"><span class="slabel-bar"></span>模板预览</div>

        <div class="preview-shell" id="preview-shell">
          <div class="preview-empty" id="preview-empty">
            <div class="preview-glyph">◎</div>
            <div class="preview-empty-label">选择模板后预览</div>
          </div>
          <div class="preview-loader" id="preview-loader">
            <div class="spin"></div>
          </div>
          <div class="preview-iframe-wrap" id="preview-iframe-wrap">
            <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
          </div>
        </div>

        <p class="preview-note">预览使用模板内置样例数据，生成时读取飞书最新内容。</p>
      </div>

    </div>
  </div>

  <script>
    // ── State ──
    let selectedTemplate = null;
    let currentStream    = null;
    let previewDebounce  = null;
    let logLineCount     = 0;
    let cursorEl         = null;
    let isRunning        = false;

    // ── DOM ──
    const btnGenerate  = document.getElementById('btn-generate');
    const btnOpen      = document.getElementById('btn-open');
    const statusText   = document.getElementById('status-text');
    const templatesEl  = document.getElementById('templates');
    const logGutter    = document.getElementById('log-gutter');
    const logContent   = document.getElementById('log-content');
    const previewShell = document.getElementById('preview-shell');
    const previewEmpty = document.getElementById('preview-empty');
    const previewLoader= document.getElementById('preview-loader');
    const previewWrap  = document.getElementById('preview-iframe-wrap');
    const previewFrame = document.getElementById('preview-frame');

    // ── Scale preview ──
    function scalePreview() {
      const w = previewShell.offsetWidth;
      previewFrame.style.transform = `scale(${w / 1200})`;
    }
    new ResizeObserver(scalePreview).observe(previewShell);
    scalePreview();

    // ── Load templates ──
    async function loadTemplates() {
      const res  = await fetch('/api/templates');
      const data = await res.json();
      data.templates.forEach((t, i) => {
        const num  = String(i + 1).padStart(2, '0');
        const card = document.createElement('div');
        card.className = 'tcard';
        card.dataset.key = t.key;
        card.dataset.outputDir = t.outputDir || '';
        card.innerHTML = `
          <span class="tcard-num">${num}</span>
          <div class="tcard-name">${t.name}</div>
          <div class="tcard-key">${t.key}</div>
        `;
        card.addEventListener('click', () => selectTemplate(card, t));
        templatesEl.appendChild(card);
      });
    }

    // ── Select template ──
    function selectTemplate(card, t) {
      document.querySelectorAll('.tcard').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedTemplate = t;
      btnGenerate.disabled = isRunning;
      statusText.textContent = `已选择：${t.name}`;
      loadPreview(t.key);
    }

    // ── Preview ──
    function loadPreview(key) {
      clearTimeout(previewDebounce);
      previewDebounce = setTimeout(() => {
        previewEmpty.style.display = 'none';
        previewLoader.classList.add('on');
        previewWrap.classList.remove('on');

        previewFrame.onload = () => {
          previewLoader.classList.remove('on');
          previewWrap.classList.add('on');
          scalePreview();
        };
        previewFrame.onerror = () => {
          previewLoader.classList.remove('on');
          previewEmpty.style.display = '';
        };
        previewFrame.src = `/api/preview-html?template=${key}&t=${Date.now()}`;
      }, 130);
    }

    // ── Log helpers ──
    function clearLog() {
      logGutter.innerHTML = '';
      logContent.innerHTML = '';
      logLineCount = 0;
      cursorEl = null;
    }

    function addGutterNum() {
      const n = document.createElement('span');
      n.className = 'log-gutter-num';
      n.textContent = logLineCount;
      logGutter.appendChild(n);
    }

    function appendLog(text, cls) {
      // Remove placeholder
      const ph = document.getElementById('log-placeholder');
      if (ph) ph.remove();

      // Remove cursor from previous line
      if (cursorEl) { cursorEl.remove(); cursorEl = null; }

      logLineCount++;
      addGutterNum();

      const line = document.createElement('span');
      line.className = 'log-line' + (cls ? ' ' + cls : '');
      line.textContent = text;
      logContent.appendChild(line);
      logContent.appendChild(document.createTextNode('\n'));
      logContent.scrollTop = logContent.scrollHeight;
      logGutter.scrollTop  = logGutter.scrollHeight;
    }

    function showCursor() {
      if (cursorEl) return;
      const lines = logContent.querySelectorAll('.log-line');
      const last  = lines[lines.length - 1];
      if (!last) return;
      cursorEl = document.createElement('span');
      cursorEl.className = 'log-cursor';
      last.appendChild(cursorEl);
    }

    function hideCursor() {
      if (cursorEl) { cursorEl.remove(); cursorEl = null; }
    }

    // ── Generate states ──
    function setRunning() {
      isRunning = true;
      btnGenerate.disabled = true;
      btnGenerate.classList.add('running');
      btnOpen.style.display = 'none';
      clearLog();
      statusText.innerHTML = badge('running', 'Running');
    }

    function setDone(outputDir) {
      isRunning = false;
      btnGenerate.disabled = false;
      btnGenerate.classList.remove('running');
      hideCursor();
      statusText.innerHTML = badge('done', 'Done');
      if (outputDir) {
        btnOpen.style.display = 'inline-block';
        btnOpen.onclick = () => fetch('/api/open-output', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dir: outputDir }),
        });
      }
    }

    function setError() {
      isRunning = false;
      btnGenerate.disabled = false;
      btnGenerate.classList.remove('running');
      hideCursor();
      statusText.innerHTML = badge('fail', 'Failed');
    }

    function badge(type, label) {
      return `<span class="badge badge-${type}"><span class="badge-dot"></span>${label}</span>`;
    }

    // ── Generate ──
    btnGenerate.addEventListener('click', () => {
      if (!selectedTemplate || isRunning) return;
      if (currentStream) { currentStream.close(); currentStream = null; }

      setRunning();

      const es = new EventSource(`/api/generate-stream?template=${selectedTemplate.key}`);
      currentStream = es;

      es.onmessage = (e) => {
        appendLog(e.data);
        showCursor();
      };

      es.addEventListener('done', () => {
        appendLog('生成完成', 'ok');
        setDone(selectedTemplate.outputDir);
        es.close();
        currentStream = null;
      });

      es.addEventListener('error', (e) => {
        appendLog(e.data || '生成失败', 'err');
        setError();
        es.close();
        currentStream = null;
      });

      es.onerror = () => {
        if (es.readyState === EventSource.CLOSED) return;
        appendLog('连接中断', 'err');
        setError();
        es.close();
        currentStream = null;
      };
    });

    loadTemplates();
  </script>
</body>
</html>
