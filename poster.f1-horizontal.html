<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>F1 车队海报（横版 2:1）</title>
  <style>
    @font-face {
      font-family: "MiSans";
      src: url("assets/fonts/MiSans-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: "MiSans";
      src: url("assets/fonts/MiSans-Bold.woff2") format("woff2");
      font-weight: 700;
      font-style: normal;
      font-display: block;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 2400px;
      height: 1200px;
      overflow: hidden;
      background: #000;
      font-family: "MiSans", "MiSans VF", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: #fff;
    }

    #poster {
      position: relative;
      width: 2400px;
      height: 1200px;
      background: #000;
      border: 1px solid #393939;
      overflow: hidden;
      --title-size: 140px;
      --title-line-height: 1.2;
      --title-max-width: 1040px;
      --subtitle-size: 56px;
      --subtitle-line-height: 1.3;
      --team-name-size: 56px;
    }

    /* ── 全局背景图（F1 赛车，铺满）── */
    .bg-image {
      position: absolute;
      left: -1px;
      top: -1px;
      width: 2401px;
      height: 1200px;
      object-fit: cover;
      z-index: 0;
    }

    /* 左侧暗化渐变，保证标题/副标题对比度 */
    .bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        rgba(0, 0, 0, 0.85) 0%,
        rgba(0, 0, 0, 0.7) 35%,
        rgba(0, 0, 0, 0.35) 60%,
        rgba(0, 0, 0, 0.1) 100%
      );
      z-index: 1;
    }

    /* ── 标题区 ── */
    .title-wrap {
      position: absolute;
      left: 120px;
      top: 120px;
      width: 1040px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      z-index: 4;
    }

    .title {
      width: min(var(--title-max-width), 100%);
      font-size: var(--title-size);
      font-weight: 800;
      line-height: var(--title-line-height);
      letter-spacing: 0;
      word-break: break-word;
      overflow: hidden;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    }

    .subtitle {
      width: 100%;
      font-size: var(--subtitle-size);
      font-weight: 400;
      line-height: var(--subtitle-line-height);
      color: rgba(255, 255, 255, 0.9);
      overflow: hidden;
      white-space: nowrap;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    /* ── BitMart logo（左下角）── */
    .brand-logo {
      position: absolute;
      left: 120px;
      bottom: 120px;
      width: 366px;
      height: 88px;
      z-index: 4;
    }
    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: left center;
      display: block;
    }

    /* ── 右侧卡片列 ── */
    .right-column {
      position: absolute;
      left: 1208px;
      top: 50%;
      transform: translateY(-50%);
      width: 1072px;
      display: flex;
      flex-direction: column;
      gap: 36px;
      z-index: 4;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* ── 单张车队卡片 ── */
    .card {
      width: 1072px;
      height: 280px;
      border-radius: 24px;
      border: 1px solid #5d5d5d;
      background: linear-gradient(90deg, #161616 0%, #151515 64%, #171717 100%);
      position: relative;
      overflow: hidden;
    }

    /* 卡片右上角青色辐射渐变 */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 360px 280px at 85% 20%, rgba(1, 224, 224, 0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── 左侧车辆背景区 ── */
    .card-bg {
      position: absolute;
      left: 0;
      top: 0;
      width: 540px;
      height: 280px;
      overflow: hidden;
      background: #0f0f0f;
      z-index: 1;
    }

    .card-bg img {
      position: absolute;
      left: 0;
      top: 0;
      width: 540px;
      height: 280px;
      object-fit: cover;
    }

    /* 右侧渐变遮罩，衔接深色背景 */
    .card-bg-gradient {
      position: absolute;
      right: 0;
      top: 0;
      width: 540px;
      height: 280px;
      background: linear-gradient(265.07deg, #161616 2.1%, rgba(22, 22, 22, 0) 98.5%);
    }

    /* ── 右侧内容区（车队名称 + 仪表盘）── 与竖版保持一致的内边距/位置 */
    .card-right {
      position: absolute;
      left: 263px;
      top: 0;
      right: 0;
      height: 280px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 36px 0 24px;
      z-index: 3;
    }

    .team-name {
      flex: 1;
      min-width: 0;
      font-size: var(--team-name-size);
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }

    /* ── 仪表盘 ── */
    .gauge {
      width: 254px;
      height: 136px;
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gauge-svg {
      width: 254px;
      height: 136px;
      overflow: visible;
    }

    .gauge-track {
      stroke: #5f666d;
      stroke-width: 12;
      fill: none;
      stroke-linecap: round;
      opacity: 0.9;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.45));
    }

    .gauge-fill {
      stroke: #1ddce2;
      stroke-width: 12;
      fill: none;
      stroke-linecap: round;
      filter: drop-shadow(0 0 8px rgba(29, 220, 226, 0.5));
    }

    .gauge-center {
      position: absolute;
      left: 0;
      right: 20px;
      top: 72px;
      text-align: center;
      font-style: normal;
      line-height: 1;
      pointer-events: none;
    }

    .gauge-value {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.252px;
      color: #fff;
      line-height: 1.1;
    }

    /* ── footer ── */
    .footer-text {
      width: 1072px;
      text-align: center;
      font-size: 26px;
      line-height: 1.2;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="poster">
    <img id="bg-image" class="bg-image" alt="" />
    <div class="bg-overlay"></div>

    <div class="title-wrap">
      <div id="title" class="title"></div>
      <div id="subtitle" class="subtitle"></div>
    </div>

    <div class="brand-logo">
      <img src="assets/bitmart-logo-horizontal.png" alt="BitMart" />
    </div>

    <div class="right-column">
      <div id="cards" class="cards"></div>
      <div id="footer-text" class="footer-text"></div>
    </div>
  </div>

  <script>
    const PREVIEW_DATA = {
      teams: [
        { name: "梅赛德斯", logo: "assets/logos/F1%20%E8%BD%A6%E9%98%9F/constructors_%E6%A2%85%E8%B5%9B%E5%BE%B7%E6%96%AF.png", percent: 28 },
        { name: "法拉利",   logo: "assets/logos/F1%20%E8%BD%A6%E9%98%9F/constructors_%E6%B3%95%E6%8B%89%E5%88%A9.png",   percent: 35 },
        { name: "迈凯伦",   logo: "assets/logos/F1%20%E8%BD%A6%E9%98%9F/constructors_%E8%BF%88%E5%87%AF%E4%BC%A6.png",  percent: 22 }
      ],
      copy: {
        title: "F1车队总冠军？",
        subtitle: "谁是你心中的冠军，做出预测吧",
        footer: "查看产品：交易 - 预测市场",
        titleFontSize: 140,
        titleLineHeight: 1.2,
        titleMaxWidth: 1040,
        subtitleFontSize: 56,
        subtitleLineHeight: 1.3,
        teamNameFontSize: 56
      }
    };

    const payload = window.GAMES_DATA || PREVIEW_DATA;
    const teams = Array.isArray(payload?.teams) ? payload.teams : [];
    const copy = payload?.copy || {};

    function toRate(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return 50;
      return Math.max(0, Math.min(100, Math.round(numeric)));
    }

    function renderHeader() {
      const poster = document.getElementById('poster');
      const title = String(copy.title || '').trim();
      const subtitle = String(copy.subtitle || '').trim();
      const footer = String(copy.footer || '').trim();

      poster.style.setProperty('--title-size', `${Number(copy.titleFontSize || 140)}px`);
      poster.style.setProperty('--title-line-height', String(copy.titleLineHeight || 1.2));
      poster.style.setProperty('--title-max-width', `${Number(copy.titleMaxWidth || 1040)}px`);
      poster.style.setProperty('--subtitle-size', `${Number(copy.subtitleFontSize || 56)}px`);
      poster.style.setProperty('--subtitle-line-height', String(copy.subtitleLineHeight || 1.3));
      poster.style.setProperty('--team-name-size', `${Number(copy.teamNameFontSize || 56)}px`);

      document.getElementById('title').textContent = title;
      document.getElementById('subtitle').textContent = subtitle;
      document.getElementById('footer-text').textContent = footer;
    }

    function renderBgImage() {
      const bgEl = document.getElementById('bg-image');
      if (window.BG_PATH) {
        bgEl.src = window.BG_PATH;
        bgEl.onerror = () => { bgEl.style.display = 'none'; };
      } else {
        bgEl.style.display = 'none';
      }
    }

    function renderGauge(percent) {
      const clamped = toRate(percent);
      return `
        <div class="gauge">
          <svg class="gauge-svg" viewBox="0 0 254 136" aria-hidden="true">
            <path class="gauge-track" d="M20 117 A97 97 0 0 1 214 117" pathLength="100"></path>
            <path class="gauge-fill" d="M20 117 A97 97 0 0 1 214 117" pathLength="100" style="stroke-dasharray:${clamped} 100"></path>
          </svg>
          <div class="gauge-center">
            <div class="gauge-value">${clamped}%</div>
          </div>
        </div>
      `;
    }

    function renderCards() {
      const container = document.getElementById('cards');
      container.innerHTML = teams.slice(0, 3).map(team => {
        const logo = String(team.logo || '').trim();
        const name = String(team.name || '').trim();
        const percent = toRate(team.percent);
        return `
          <div class="card">
            <div class="card-bg">
              ${logo ? `<img src="${logo}" alt="${name}" />` : ''}
              <div class="card-bg-gradient"></div>
            </div>
            <div class="card-right">
              <div class="team-name">${name}</div>
              ${renderGauge(percent)}
            </div>
          </div>
        `;
      }).join('');
    }

    // 标题自适应：超出两行就二分缩字号
    function fitTitle() {
      const poster = document.getElementById('poster');
      const titleEl = document.getElementById('title');
      const baseFontSize = Number(copy.titleFontSize || 140);
      const lineHeight = Number(copy.titleLineHeight || 1.2);
      const maxH = (fs) => Math.ceil(fs * lineHeight * 2) + 8;

      function measure(fs) {
        poster.style.setProperty('--title-size', `${fs}px`);
        titleEl.style.maxHeight = 'none';
        void titleEl.offsetHeight;
        return titleEl.scrollHeight;
      }

      if (measure(baseFontSize) <= maxH(baseFontSize)) {
        titleEl.style.maxHeight = `${maxH(baseFontSize)}px`;
        return;
      }

      const minFontSize = Math.max(80, Math.round(baseFontSize * 0.6));
      let lo = minFontSize;
      let hi = baseFontSize;
      let chosen = minFontSize;
      while (lo <= hi) {
        const mid = Math.round((lo + hi) / 2);
        if (measure(mid) <= maxH(mid)) {
          chosen = mid;
          lo = mid + 1;
        } else {
          hi = mid - 1;
        }
      }
      measure(chosen);
      titleEl.style.maxHeight = `${maxH(chosen)}px`;
    }

    function fitSubtitle() {
      const poster = document.getElementById('poster');
      const subtitleEl = document.getElementById('subtitle');
      if (!poster || !subtitleEl) return;

      const baseFontSize = Number(copy.subtitleFontSize || 56);
      const minFontSize = 28;

      poster.style.setProperty('--subtitle-size', `${baseFontSize}px`);
      subtitleEl.style.textOverflow = 'clip';
      void subtitleEl.offsetWidth;

      if (subtitleEl.scrollWidth <= subtitleEl.clientWidth + 1) return;

      let lo = minFontSize;
      let hi = baseFontSize;
      let chosen = minFontSize;
      while (lo <= hi) {
        const mid = Math.round((lo + hi) / 2);
        poster.style.setProperty('--subtitle-size', `${mid}px`);
        void subtitleEl.offsetWidth;
        if (subtitleEl.scrollWidth <= subtitleEl.clientWidth + 1) {
          chosen = mid;
          lo = mid + 1;
        } else {
          hi = mid - 1;
        }
      }
      poster.style.setProperty('--subtitle-size', `${chosen}px`);
    }

    function render() {
      renderHeader();
      renderBgImage();
      renderCards();
      // fit* 必须等字体加载完再测量（避免 fallback 字体测量不准）
      const fit = () => { fitTitle(); fitSubtitle(); };
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(fit);
      } else {
        fit();
      }
    }

    render();
  </script>
</body>
</html>
