<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>F1海报</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 1200px;
      overflow: hidden;
      background: #000;
      font-family: "MiSans", "MiSans VF", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: #fff;
    }

    #poster {
      position: relative;
      width: 1200px;
      height: 1200px;
      background: #000;
      border: 1px solid #393939;
      overflow: hidden;
      --title-size: 110px;
      --title-line-height: 1.2;
      --title-max-width: 824px;
      --subtitle-size: 46px;
      --subtitle-line-height: 1.3;
      --team-name-size: 52px;
    }

    /* ── 全局背景图（window.BG_PATH 注入） ── */
    .bg-image {
      position: absolute;
      left: -1px;
      top: -1px;
      width: 1201px;
      height: 1200px;
      object-fit: cover;
      z-index: 0;
    }

    /* ── F1赛车头图（可选，叠在背景上方顶部） ── */
    .header-image {
      position: absolute;
      left: 0;
      top: 0;
      width: 1200px;
      height: 390px;
      object-fit: cover;
      object-position: center top;
      z-index: 1;
      display: none; /* 默认隐藏，有 headerImage 时才显示 */
    }

    /* 头图底部渐变遮罩（淡出到透明/黑色） */
    .header-overlay {
      position: absolute;
      left: 0;
      top: 0;
      width: 1200px;
      height: 420px;
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.0) 0%,
        rgba(0, 0, 0, 0.1) 40%,
        rgba(0, 0, 0, 0.55) 70%,
        rgba(0, 0, 0, 1) 100%
      );
      z-index: 2;
    }

    /* ── BitMart Logo ── */
    .brand-logo {
      position: absolute;
      left: 933px;
      top: 54px;
      width: 204px;
      height: 71px;
      object-fit: contain;
      object-position: right center;
      z-index: 4;
    }

    .brand-fallback {
      position: absolute;
      right: 64px;
      top: 62px;
      font-size: 48px;
      line-height: 1;
      color: #d8d8d8;
      font-weight: 700;
      letter-spacing: 0.02em;
      display: none;
      z-index: 4;
    }

    /* ── 标题区 ── */
    .title-wrap {
      position: absolute;
      left: 64px;
      top: 53px;
      width: 840px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      z-index: 4;
    }

    .title {
      width: min(var(--title-max-width), 100%);
      font-size: var(--title-size);
      font-weight: 800;
      line-height: var(--title-line-height);
      letter-spacing: 0;
      word-break: break-word;
      overflow: hidden;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    }

    .subtitle {
      font-size: var(--subtitle-size);
      font-weight: 400;
      line-height: var(--subtitle-line-height);
      color: rgba(255, 255, 255, 0.9);
      overflow: hidden;
      white-space: nowrap;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    /* ── 车队卡片容器 ── */
    .cards {
      position: absolute;
      left: 63px;
      top: 359px;
      width: 1072px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 4;
    }

    /* ── 单张车队卡片 ── */
    .card {
      width: 1072px;
      height: 220px;
      border-radius: 20px;
      border: 1px solid #5d5d5d;
      background: linear-gradient(90deg, #161616 0%, #151515 64%, #171717 100%);
      position: relative;
      overflow: hidden;
    }

    /* 卡片右上角青色辐射渐变 */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 320px 220px at 85% 20%, rgba(1, 224, 224, 0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── 左侧车辆背景区（483×220） ── */
    .card-bg {
      position: absolute;
      left: 0;
      top: 0;
      width: 483px;
      height: 220px;
      overflow: hidden;
      background: #0f0f0f;
      z-index: 1;
    }

    /* 车队 logo 铺满左侧区域，贴到左/上/下边缘 */
    .card-bg img {
      position: absolute;
      left: 0;
      top: 0;
      width: 483px;
      height: 220px;
      object-fit: cover;
    }

    /* 右侧渐变遮罩，衔接深色背景 */
    .card-bg-gradient {
      position: absolute;
      right: 0;
      top: 0;
      width: 483px;
      height: 220px;
      background: linear-gradient(265.07deg, #161616 2.1%, rgba(22, 22, 22, 0) 98.5%);
    }

    /* ── 右侧内容区（车队名称 + 仪表盘） ── */
    .card-right {
      position: absolute;
      left: 263px;
      top: 0;
      right: 0;
      height: 220px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 36px 0 24px;
      z-index: 3;
    }

    /* ── 车队名称 ── */
    .team-name {
      flex: 1;
      min-width: 0;
      font-size: var(--team-name-size);
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }

    /* ── 仪表盘（半圆进度） ── */
    .gauge {
      width: 254px;
      height: 136px;
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gauge-svg {
      width: 254px;
      height: 136px;
      overflow: visible;
    }

    .gauge-track {
      stroke: #5f666d;
      stroke-width: 12;
      fill: none;
      stroke-linecap: round;
      opacity: 0.9;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.45));
    }

    .gauge-fill {
      stroke: #1ddce2;
      stroke-width: 12;
      fill: none;
      stroke-linecap: round;
      filter: drop-shadow(0 0 8px rgba(29, 220, 226, 0.5));
    }

    .gauge-center {
      position: absolute;
      left: 0;
      right: 20px;
      top: 72px;
      text-align: center;
      font-style: normal;
      line-height: 1;
      pointer-events: none;
    }

    .gauge-value {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.252px;
      color: #fff;
      line-height: 1.1;
    }

    .gauge-label {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 700;
      color: #6a7c81;
      line-height: 1;
    }


    .footer-text {
      position: absolute;
      left: 103px;
      top: 1128px;
      width: 993px;
      text-align: center;
      font-size: 26px;
      line-height: 1.2;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      z-index: 5;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="poster">
    <img id="bg-image" class="bg-image" alt="" />
    <img id="header-image" class="header-image" alt="" />
    <div class="header-overlay"></div>

    <img id="brand-logo" class="brand-logo" alt="BitMart" />
    <div id="brand-fallback" class="brand-fallback">BitMart</div>

    <div class="title-wrap">
      <div id="title" class="title"></div>
      <div id="subtitle" class="subtitle"></div>
    </div>

    <div id="cards" class="cards"></div>

    <div id="footer-text" class="footer-text"></div>
  </div>

  <script>
    const DEFAULT_BRAND_LOGO = "https://www.figma.com/api/mcp/asset/88a5bbf0-8a3e-4588-8a84-cb6ac831fc19";

    // 预览用默认数据（generate.js 会注入 window.GAMES_DATA 覆盖）
    const PREVIEW_DATA = {
      teams: [
        { name: "梅赛德斯", logo: "../../../assets/logos/F1%20%E8%BD%A6%E9%98%9F/constructors_%E6%A2%85%E8%B5%9B%E5%BE%B7%E6%96%AF.png", percent: 28 },
        { name: "法拉利",   logo: "../../../assets/logos/F1%20%E8%BD%A6%E9%98%9F/constructors_%E6%B3%95%E6%8B%89%E5%88%A9.png",   percent: 35 },
        { name: "迈凯伦",   logo: "../../../assets/logos/F1%20%E8%BD%A6%E9%98%9F/constructors_%E8%BF%88%E5%87%AF%E4%BC%A6.png",  percent: 22 }
      ],
      copy: {
        title: "F1车队总冠军？",
        subtitle: "预测比赛，赢取奖励",
        footer: "立即加入：预测市场 – 体育 – F1",
        titleFontSize: 110,
        titleLineHeight: 1.2,
        titleMaxWidth: 824,
        subtitleFontSize: 46,
        subtitleLineHeight: 1.3,
        teamNameFontSize: 52,
        headerImage: "assets/f1_car.png",
        brandLogo: ""
      }
    };

    const payload = window.GAMES_DATA || PREVIEW_DATA;
    const teams = Array.isArray(payload?.teams) ? payload.teams : [];
    const copy = payload?.copy || {};

    function toRate(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return 50;
      return Math.max(0, Math.min(100, Math.round(numeric)));
    }

    function renderHeader() {
      const poster = document.getElementById('poster');
      const title = String(copy.title || '').trim();
      const subtitle = String(copy.subtitle || '').trim();
      const footer = String(copy.footer || '').trim();

      poster.style.setProperty('--title-size', `${Number(copy.titleFontSize || 110)}px`);
      poster.style.setProperty('--title-line-height', String(copy.titleLineHeight || 1.2));
      poster.style.setProperty('--title-max-width', `${Number(copy.titleMaxWidth || 824)}px`);
      poster.style.setProperty('--subtitle-size', `${Number(copy.subtitleFontSize || 46)}px`);
      poster.style.setProperty('--subtitle-line-height', String(copy.subtitleLineHeight || 1.3));
      poster.style.setProperty('--team-name-size', `${Number(copy.teamNameFontSize || 52)}px`);

      document.getElementById('title').textContent = title;
      document.getElementById('subtitle').textContent = subtitle;
      document.getElementById('footer-text').textContent = footer;
    }

    function renderBgImage() {
      const bgEl = document.getElementById('bg-image');
      if (window.BG_PATH) {
        bgEl.src = window.BG_PATH;
        bgEl.onerror = () => { bgEl.style.display = 'none'; };
      } else {
        bgEl.style.display = 'none';
      }
    }

    function renderHeaderImage() {
      const imgEl = document.getElementById('header-image');
      const src = String(copy.headerImage || '').trim();
      if (src) {
        imgEl.style.display = 'block';
        imgEl.src = src;
        imgEl.onerror = () => { imgEl.style.display = 'none'; };
      } else {
        imgEl.style.display = 'none';
      }
    }

    function renderBrand() {
      const logoEl = document.getElementById('brand-logo');
      const fallbackEl = document.getElementById('brand-fallback');
      const logoSrc = String(copy.brandLogo || DEFAULT_BRAND_LOGO).trim();

      if (!logoSrc) {
        logoEl.style.display = 'none';
        fallbackEl.style.display = 'block';
        return;
      }

      logoEl.src = logoSrc;
      logoEl.onerror = () => {
        logoEl.style.display = 'none';
        fallbackEl.style.display = 'block';
      };
      logoEl.onload = () => {
        logoEl.style.display = 'block';
        fallbackEl.style.display = 'none';
      };
    }

    function renderGauge(percent) {
      const clamped = toRate(percent);
      return `
        <div class="gauge">
          <svg class="gauge-svg" viewBox="0 0 254 136" aria-hidden="true">
            <path class="gauge-track" d="M20 117 A97 97 0 0 1 214 117" pathLength="100"></path>
            <path class="gauge-fill" d="M20 117 A97 97 0 0 1 214 117" pathLength="100" style="stroke-dasharray:${clamped} 100"></path>
          </svg>
          <div class="gauge-center">
            <div class="gauge-value">${clamped}%</div>
          </div>
        </div>
      `;
    }

    function renderCards() {
      const container = document.getElementById('cards');
      container.innerHTML = teams.slice(0, 3).map(team => {
        const logo = String(team.logo || '').trim();
        const name = String(team.name || '').trim();
        const percent = toRate(team.percent);
        return `
          <div class="card">
            <div class="card-bg">
              ${logo ? `<img src="${logo}" alt="${name}" />` : ''}
              <div class="card-bg-gradient"></div>
            </div>
            <div class="card-right">
              <div class="team-name">${name}</div>
              ${renderGauge(percent)}
            </div>
          </div>
        `;
      }).join('');
    }

    // 大标题自适应：同 comprehensive 模板逻辑
    function fitTitle() {
      const poster = document.getElementById('poster');
      const titleEl = document.getElementById('title');
      const baseFontSize = Number(copy.titleFontSize || 110);
      const twoLineFontSize = 86;
      const minFontSize = 70;
      const lineHeight = Number(copy.titleLineHeight || 1.2);

      const maxH = (fs) => Math.ceil(fs * lineHeight * 2) + 4;

      function measure(fs) {
        poster.style.setProperty('--title-size', `${fs}px`);
        titleEl.style.maxHeight = 'none';
        void titleEl.offsetHeight;
        return titleEl.scrollHeight;
      }

      const oneLineH = Math.ceil(baseFontSize * lineHeight) + 4;
      if (measure(baseFontSize) <= oneLineH) {
        titleEl.style.maxHeight = `${maxH(baseFontSize)}px`;
        return;
      }

      if (measure(twoLineFontSize) <= maxH(twoLineFontSize)) {
        titleEl.style.maxHeight = `${maxH(twoLineFontSize)}px`;
        return;
      }

      let lo = minFontSize;
      let hi = twoLineFontSize - 1;
      let chosen = minFontSize;
      while (lo <= hi) {
        const mid = Math.round((lo + hi) / 2);
        if (measure(mid) <= maxH(mid)) {
          chosen = mid;
          lo = mid + 1;
        } else {
          hi = mid - 1;
        }
      }
      measure(chosen);
      titleEl.style.maxHeight = `${maxH(chosen)}px`;
    }

    // 副标题始终保持单行：过长时自动缩小字号，不显示省略号
    function fitSubtitle() {
      const poster = document.getElementById('poster');
      const subtitleEl = document.getElementById('subtitle');
      if (!poster || !subtitleEl) return;

      const baseFontSize = Number(copy.subtitleFontSize || 46);
      const minFontSize = 24;

      poster.style.setProperty('--subtitle-size', `${baseFontSize}px`);
      subtitleEl.style.textOverflow = 'clip';
      void subtitleEl.offsetWidth;

      if (subtitleEl.scrollWidth <= subtitleEl.clientWidth + 1) return;

      let lo = minFontSize;
      let hi = baseFontSize;
      let chosen = minFontSize;
      while (lo <= hi) {
        const mid = Math.round((lo + hi) / 2);
        poster.style.setProperty('--subtitle-size', `${mid}px`);
        void subtitleEl.offsetWidth;
        if (subtitleEl.scrollWidth <= subtitleEl.clientWidth + 1) {
          chosen = mid;
          lo = mid + 1;
        } else {
          hi = mid - 1;
        }
      }
      poster.style.setProperty('--subtitle-size', `${chosen}px`);
    }

    function render() {
      renderHeader();
      fitTitle();
      fitSubtitle();
      renderBgImage();
      renderHeaderImage();
      renderBrand();
      renderCards();
    }

    render();
  </script>
</body>
</html>
